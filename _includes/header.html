<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="2"/>
          <path d="M11 26V12l4 8 4-8v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="26" cy="14" r="3" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span class="logo-text">墨韵学社</span>
      </a>
      <nav class="main-nav" id="mainNav">
        <ul class="nav-list">
          <li><a href="{{ '/' | relative_url }}" class="nav-link{% if page.url == '/' %} active{% endif %}">首页</a></li>
          <li><a href="{{ '/chinese-essays/' | relative_url }}" class="nav-link{% if page.url contains 'chinese' %} active{% endif %}">语文作文</a></li>
          <li><a href="{{ '/english-essays/' | relative_url }}" class="nav-link{% if page.url contains 'english' %} active{% endif %}">英语作文</a></li>
          <li><a href="{{ '/math-challenges/' | relative_url }}" class="nav-link{% if page.url contains 'math' %} active{% endif %}">数学压轴</a></li>
          <li><a href="{{ '/forum/' | relative_url }}" class="nav-link{% if page.url contains 'forum' %} active{% endif %}">论坛</a></li>
        </ul>
      </nav>
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
